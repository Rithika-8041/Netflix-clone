<!DOCTYPE html>
<html>
<head>
<title>My website</title>
<meta charset ="utf-8">

<style>
h1{
text-align: center;
color: white;
font-size: 120px;
text-shadow: 2px 2px 4px #111;
}
.hero-image{
    width: 60%;
    border-radius: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 30px;
}
.small-button{
    width: 90%;
    height: 50px;
    font-weight: bolder;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: red;
    color: white;
}
p{
text-align: center;
color: white;
}
body{
    text-align: center;
    color: white;
    background: linear-gradient(to left,darkred,black, darkred,black,black,darkred,black,darkred);
}
.card-container{
    display: flex;
    justify-content: space-evenly;
    margin-bottom: 30px;
    gap: 20px;
}
.card{
    background-color: #111;
    width: 250px;
    border: 1px solid white;
    border-radius: 20px;
    transition: all 0.5s ease-in-out;
    padding-bottom: 15px;
}
.card-image{
    width: 100%;
    height: 300px;
    object-fit: cover;
     border-radius: 20px 20px 0 0;
}
.card:hover{
    transform: translateY(-25px);
}
</style>
</head>
<body>
